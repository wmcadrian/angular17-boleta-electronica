<div class="lg:col-span-3 space-y-6">

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">

    <h1 class="text-2xl font-bold text-slate-900 mb-6">Nueva Boleta de Venta Electrónica</h1>

    <app-information></app-information>

    <app-concepts></app-concepts>

    <button 
      (click)="validarCalcular()"
      type="button"
      class="w-full cursor-pointer rounded-xl bg-blue-600 px-6 py-4 text-base font-bold text-white tracking-wide shadow-md transition hover:bg-blue-700 hover:shadow-lg active:scale-[0.99]">
      VALIDAR Y CALCULAR SUBTOTALES ✅
    </button>

  </div>

  <app-history></app-history>

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Debug formulario</p>
    <pre class="text-xs font-mono text-slate-600 bg-slate-50 rounded p-3 overflow-x-auto">{{ invoiceService.form.value | json }}</pre>
    <p class="mt-2 text-xs font-mono">
      <span class="font-semibold">válido:</span>
      <span [class.text-green-600]="invoiceService.form.valid" [class.text-red-600]="!invoiceService.form.valid">
        {{ invoiceService.form.valid }}
      </span>
    </p>
  </div>

</div>
