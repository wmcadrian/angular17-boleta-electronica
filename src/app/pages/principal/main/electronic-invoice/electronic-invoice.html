<div class="lg:col-span-3 space-y-6">

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">

    <h1 class="text-2xl font-bold text-slate-900 mb-6">Nueva Boleta de Venta Electrónica</h1>

    <app-information></app-information>

    <app-concepts></app-concepts>

    <button 
      (click)="validarCalcular()"
      type="button"
      [disabled]="loadingTasas()"
      class="w-full rounded-xl px-6 py-4 text-base font-bold text-white tracking-wide shadow-md transition active:scale-[0.99]"
      [class.cursor-pointer]="!loadingTasas()"
      [class.cursor-wait]="loadingTasas()"
      [class.bg-blue-600]="!loadingTasas()"
      [class.hover:bg-blue-700]="!loadingTasas()"
      [class.hover:shadow-lg]="!loadingTasas()"
      [class.bg-blue-400]="loadingTasas()">
      @if (loadingTasas()) {
        Consultando tasas de cambio… ⏳
      } @else {
        VALIDAR Y CALCULAR SUBTOTALES
      }
    </button>

  </div>

  <app-history class="hidden lg:block"></app-history>

  @let modalConfig = modalService.modalState$ | async;
  @if (modalConfig) {
    <app-modal
      [tipo]="modalConfig.tipo"
      [titulo]="modalConfig.titulo"
      [mensaje]="modalConfig.mensaje"
      (cerrado)="modalService.cerrar()"
    />
  }

    <pre class="text-xs font-mono text-slate-600 bg-slate-50 rounded p-3 overflow-x-auto">{{ invoiceService.form.value | json }}</pre>
    <p class="mt-2 text-xs font-mono">
      <span class="font-semibold">válido:</span>
      <span [class.text-green-600]="invoiceService.form.valid" [class.text-red-600]="!invoiceService.form.valid">
        {{ invoiceService.form.valid }}
      </span>
    </p>
  </div> -->

</div>
